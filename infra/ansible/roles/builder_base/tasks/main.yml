---
- name: Update apt cache
  become: yes
  ansible.builtin.apt:
    update_cache: yes

- name: Install base system packages
  become: yes
  ansible.builtin.apt:
    name:
      - git
      - curl
      - wget
      - unzip
      - build-essential
      - python3
      - python3-pip
      - python3-venv
      - pipx
      - ansible
      - ca-certificates
      - gnupg
    state: present

- name: Check if GitHub CLI is installed
  ansible.builtin.command: which gh
  register: gh_check
  changed_when: false
  failed_when: false

- name: Add GitHub CLI apt key
  become: yes
  ansible.builtin.shell: |
    set -e
    mkdir -p /usr/share/keyrings
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
      | gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
    chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/githubcli-archive-keyring.gpg
  when: gh_check.rc != 0

- name: Add GitHub CLI apt repository
  become: yes
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/github-cli.list
    content: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\n"
    mode: "0644"
  when: gh_check.rc != 0

- name: Install GitHub CLI
  become: yes
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: yes
  when: gh_check.rc != 0

- name: Ensure user local bin is on PATH
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"'
    create: yes
    mode: "0644"

- name: Install uv
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/uv"

- name: Install aider-chat with uv
  ansible.builtin.shell: |
    {{ ansible_env.HOME }}/.local/bin/uv tool install aider-chat
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/aider"

- name: Verify builder tools
  ansible.builtin.shell: |
    set -e
    git --version
    gh --version
    ansible --version
    {{ ansible_env.HOME }}/.local/bin/uv --version
    {{ ansible_env.HOME }}/.local/bin/aider --version
  changed_when: false
